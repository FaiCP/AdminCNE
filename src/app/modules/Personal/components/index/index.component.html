<div class="page-toolbar">
  <div class="page-toolbar__start">
    <button mat-raised-button color="primary" (click)="openDialog('0ms','0ms')">
      <mat-icon>add</mat-icon> Nuevo personal
    </button>
  </div>
  <mat-form-field appearance="outline" class="page-toolbar__search">
    <mat-icon matPrefix>search</mat-icon>
    <mat-label>Buscar personal</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Nombre, cédula, cargo...">
  </mat-form-field>
  <div class="page-toolbar__end">
    <button mat-stroked-button (click)="enviarActa()" matTooltip="Generar acta de personal">
      <mat-icon>picture_as_pdf</mat-icon> Acta PDF
    </button>
  </div>
</div>

<div class="table-card">
  <mat-progress-bar mode="indeterminate" color="accent" *ngIf="store.isLoading()"></mat-progress-bar>

  <table mat-table [dataSource]="store.items()" class="cne-table">

    <ng-container matColumnDef="cedula">
      <th mat-header-cell *matHeaderCellDef>Cédula</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showCedula">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.cedula" placeholder="Cédula">
        </ng-container>
        <ng-template #showCedula>{{ element.cedula }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showNombre">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.nombre" placeholder="Nombre">
        </ng-container>
        <ng-template #showNombre>{{ element.nombre }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="cargo">
      <th mat-header-cell *matHeaderCellDef>Cargo</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showCargo">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.cargo" placeholder="Cargo">
        </ng-container>
        <ng-template #showCargo>{{ element.cargo }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="correo">
      <th mat-header-cell *matHeaderCellDef>Correo</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showEmail">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.email" placeholder="Correo">
        </ng-container>
        <ng-template #showEmail>{{ element.email }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="pass">
      <th mat-header-cell *matHeaderCellDef>Contraseña temporal</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showPass">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.tempPass" placeholder="Contraseña">
        </ng-container>
        <ng-template #showPass>{{ element.tempPass }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="Action">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="warn" (click)="eliminar(element.id)" matTooltip="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <mat-checkbox (change)="onCheckboxChange(element, $event.checked)"></mat-checkbox>
      </td>
    </ng-container>

    <ng-container matColumnDef="editar">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <div class="row-actions">
          <ng-container *ngIf="editandoElementoId === element.id; else editBtn">
            <button mat-icon-button color="primary" (click)="guardarEdicion()" matTooltip="Guardar">
              <mat-icon>check_circle</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="cancelarEdicion()" matTooltip="Cancelar">
              <mat-icon>cancel</mat-icon>
            </button>
          </ng-container>
          <ng-template #editBtn>
            <button mat-icon-button color="accent" (click)="iniciarEdicion(element)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
          </ng-template>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length">
        <div class="empty-state">
          <mat-icon>group</mat-icon>
          <p>No se encontró personal</p>
        </div>
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="cantidadTotal"
    [pageSize]="CantidadPagina"
    [pageSizeOptions]="tamanioPaginaOptions"
    [pageIndex]="numerPagina"
    showFirstLastButtons
    (page)="cambiarPagina($event)">
  </mat-paginator>
</div>
