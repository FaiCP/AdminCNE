<div class="page-toolbar">
  <div class="page-toolbar__start">
    <button mat-raised-button color="primary" (click)="openDialog('0ms','0ms')">
      <mat-icon>add</mat-icon> Nuevo custodio
    </button>
  </div>
  <mat-form-field appearance="outline" class="page-toolbar__search">
    <mat-icon matPrefix>search</mat-icon>
    <mat-label>Buscar custodios</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Nombre, cédula, cargo...">
  </mat-form-field>
</div>

<div class="table-card">
  <mat-progress-bar mode="indeterminate" color="accent" *ngIf="store.isLoading()"></mat-progress-bar>

  <table mat-table [dataSource]="store.items()" class="cne-table">

    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef>N°</th>
      <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showNombre">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.nombreEmpleado" placeholder="Nombre">
        </ng-container>
        <ng-template #showNombre>{{ element.nombreEmpleado || element.nombre_empleado }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="cedula">
      <th mat-header-cell *matHeaderCellDef>Cédula</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showCedula">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.cedulaEmpleado" placeholder="Cédula">
        </ng-container>
        <ng-template #showCedula>{{ element.cedulaEmpleado || element.cedula_empleado }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="Cargo">
      <th mat-header-cell *matHeaderCellDef>Cargo</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showCargo">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.cargoEmpleado" placeholder="Cargo">
        </ng-container>
        <ng-template #showCargo>{{ element.cargoEmpleado || element.cargo_empleado }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="Departamento">
      <th mat-header-cell *matHeaderCellDef>Departamento</th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editandoElementoId === element.id; else showDep">
          <input matInput class="cell-input" [(ngModel)]="elementoEditado.departamento" placeholder="Departamento">
        </ng-container>
        <ng-template #showDep>{{ element.departamento }}</ng-template>
      </td>
    </ng-container>

    <ng-container matColumnDef="borrado">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="warn" (click)="eliminar(element.id)" matTooltip="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="editar">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <div class="row-actions">
          <ng-container *ngIf="editandoElementoId === element.id; else editBtn">
            <button mat-icon-button color="primary" (click)="guardarEdicion()" matTooltip="Guardar">
              <mat-icon>check_circle</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="cancelarEdicion()" matTooltip="Cancelar">
              <mat-icon>cancel</mat-icon>
            </button>
          </ng-container>
          <ng-template #editBtn>
            <button mat-icon-button color="accent" (click)="iniciarEdicion(element)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
          </ng-template>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length">
        <div class="empty-state">
          <mat-icon>badge</mat-icon>
          <p>No se encontraron custodios</p>
        </div>
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="cantidadTotal"
    [pageSize]="CantidadPagina"
    [pageSizeOptions]="tamanioPaginaOptions"
    [pageIndex]="numerPagina"
    showFirstLastButtons
    (page)="cambiarPagina($event)">
  </mat-paginator>
</div>
