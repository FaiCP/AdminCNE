<div class="reports-page">
  <h2 class="reports-title">Reportes - Dashboard</h2>

  @if (isLoading()) {
    <mat-progress-bar mode="indeterminate" class="reports-progress"></mat-progress-bar>
  }

  <div class="kpi-grid">
    <mat-card class="kpi-card">
      <mat-card-content>
        <div class="kpi-card__body">
          <div class="kpi-card__icon kpi-card__icon--blue">
            <mat-icon>inventory_2</mat-icon>
          </div>
          <div>
            <div class="kpi-card__value">{{ totalHardware() }}</div>
            <div class="kpi-card__label">Hardware</div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="kpi-card">
      <mat-card-content>
        <div class="kpi-card__body">
          <div class="kpi-card__icon kpi-card__icon--green">
            <mat-icon>swap_horiz</mat-icon>
          </div>
          <div>
            <div class="kpi-card__value kpi-card__value--green">{{ totalPrestamos() }}</div>
            <div class="kpi-card__label">Prestamos</div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="kpi-card">
      <mat-card-content>
        <div class="kpi-card__body">
          <div class="kpi-card__icon kpi-card__icon--purple">
            <mat-icon>badge</mat-icon>
          </div>
          <div>
            <div class="kpi-card__value kpi-card__value--purple">{{ totalCustodios() }}</div>
            <div class="kpi-card__label">Custodios</div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="kpi-card">
      <mat-card-content>
        <div class="kpi-card__body">
          <div class="kpi-card__icon kpi-card__icon--orange">
            <mat-icon>inventory</mat-icon>
          </div>
          <div>
            <div class="kpi-card__value kpi-card__value--orange">{{ totalSuministros() }}</div>
            <div class="kpi-card__label">Suministros</div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="charts-grid">
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Inventario por Tipo</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          <canvas
            baseChart
            [data]="barChartData"
            [options]="barChartOptions"
            [type]="barChartType"
          ></canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Prestamos por Mes</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          <canvas
            baseChart
            [data]="doughnutChartData"
            [options]="doughnutChartOptions"
            [type]="doughnutChartType"
          ></canvas>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
